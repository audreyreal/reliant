name: release

on:
  push:
    branches: [main]
    paths:
        - 'src/**'
        - 'build/manifest.json'
        - '.github/workflows/release.yml'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type Check with TypeScript
        run: pnpm type-check

      - name: Build CSS
        run: pnpm build:css

      - name: Build TypeScript
        run: pnpm build

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Increment version and manifest
        id: increment_version
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Increment version in package.json without committing
          npm version patch --no-git-tag-version
          
          # Get the new version
          NEW_VERSION=$(jq -r '.version' package.json)
          
          # Update manifest.json
          jq --arg ver "$NEW_VERSION" '.version = $ver' build/manifest.json > build/manifest.tmp && mv build/manifest.tmp build/manifest.json
          
          # Commit both changes together
          git add package.json build/manifest.json
          git commit -m "Upgrade to ${NEW_VERSION} by GitHub Actions"
          
          # Tag and push
          git tag "${NEW_VERSION}"
          git push origin main --follow-tags
          
          # Set version for subsequent steps
          echo "new_version=${NEW_VERSION}" >> $GITHUB_ENV

      - name: Create zip of build
        run: zip -r reliant-release.zip build

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.new_version }}
          release_name: ${{ env.new_version }}
          draft: false
          prerelease: false

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./reliant-release.zip
          asset_name: reliant-release.zip
          asset_content_type: application/zip

      - name: Discord Webhook Action
        uses: tsickert/discord-webhook@v6.0.0
        with:
          webhook-url: ${{ secrets.WEBHOOK_URL }}
          content: "New Reliant Release: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ env.new_version }}"
